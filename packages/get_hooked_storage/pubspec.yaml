name: get_hooked_storage
description: "Persistent GetValue objects backed by SharedPreferences for get_hooked."
version: 0.1.1
homepage: https://no-tolls.dev/
issue_tracker: https://github.com/nate-thegrate/get_hooked/issues
repository: https://github.com/nate-thegrate/get_hooked/tree/main/packages/get_hooked_storage
topics:
  - flutter
  - state-management
  - persistence
  - shared-preferences

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  get_hooked: ^0.5.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=1.0.0"

# Local monorepo resolution while developing against the sibling package.
dependency_overrides:
  get_hooked:
    path: ../get_hooked
